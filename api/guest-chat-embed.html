<style>

               "Noto Sans JP", sans-serif;

/* ヘッダー */
.tgc-header {
  background: linear-gradient(135deg, #1a1a3a, #0a0a2a);
  padding: 1em 1.5em;
  border-bottom: 1px solid #c9a858;

.tgc-header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;

  flex: 1;

}

  color: #c9a858;
  background: rgba(201, 168, 88, 0.15);

  border-radius: 20px;
  border: 1px solid rgba(201, 168, 88, 0.3);

/* メッセージエリア */

  padding: 1.5em;
  height: 400px;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.tgc-messages::-webkit-scrollbar {

}
.tgc-messages::-webkit-scrollbar-thumb {
  background: rgba(201, 168, 88, 0.3);
  border-radius: 3px;
}

/* メッセージバブル */
.tgc-message {
  margin-bottom: 1.2em;
  display: flex;
}

.tgc-message.tgc-user {
  justify-content: flex-end;
}

.tgc-message-content {
  max-width: 85%;
  padding: 1em 1.2em;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 0.95em;
}

.tgc-message.tgc-user .tgc-message-content {
  background: rgba(201, 168, 88, 0.15);
  border: 1px solid rgba(201, 168, 88, 0.3);
  color: #fff;
}

.tgc-message.tgc-assistant .tgc-message-content {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #f0f0f0;
}

.tgc-message-content p {
  margin: 0 0 0.8em 0;
}
.tgc-message-content p:last-child {
  margin-bottom: 0;
}

/* 起点ボタン */
.tgc-start-buttons {
  padding: 0 1.5em 1em;
}

.tgc-start-hint {
  color: #aaa;
  font-size: 0.85em;
  margin-bottom: 0.8em;
  text-align: center;
}

.tgc-button-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.6em;
}

  padding: 0.9em 1em;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(201, 168, 88, 0.3);
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  text-align: left;
  font-size: 0.9em;
  transition: all 0.2s;
  font-family: inherit;
}

.tgc-start-btn:hover {
  background: rgba(201, 168, 88, 0.15);
  border-color: #c9a858;
  transform: translateY(-1px);

  transform: translateY(0);

/* 入力欄 */
.tgc-input-area {
  display: flex;
  padding: 1em 1.5em;
  gap: 0.6em;

/* ローディング表示 */

  content: '...';

  0%, 20% { content: '.'; }

}

/* スマホ対応 */
@media (max-width: 600px) {
  #tenmon-ark-guest-chat {
    margin: 1em 0;
    border-radius: 8px;
  }

    padding: 0.8em 1em;
  }
  
  .tgc-subtitle {

  }
  
  .tgc-messages {
    padding: 1em;
    height: 350px;
  }
  
  .tgc-message-content {
    max-width: 95%;
    padding: 0.8em 1em;
    font-size: 0.9em;
  }
  
  .tgc-button-grid {
    grid-template-columns: 1fr;
  }
  
  .tgc-start-btn {
    padding: 0.8em 1em;
    font-size: 0.85em;
  }
  
  .tgc-input-area {
    padding: 0.8em 1em;
  }

</style>

<script>
(function() {
  'use strict';
  
  // ── 設定 ──
  var API_ENDPOINT = 'https://tenmon-ark.com/api/guest/chat';
  var SESSION_ID = 'guest_' + Date.now() + '_' + 
    Math.random().toString(36).substr(2, 9);
  
  var isRequestInProgress = false;
  var turnCount = 0;
  
  // ── DOM 要素 ──
  var messagesEl = document.getElementById('tgc-messages');
  var inputEl = document.getElementById('tgc-input');
  var sendBtn = document.getElementById('tgc-send-btn');
  var startButtonsEl = document.getElementById('tgc-start-buttons');
  var remainingEl = document.getElementById('tgc-remaining-turns');
  var footerEl = document.getElementById('tgc-footer');
  
  // ── 起点ボタンのクリックイベント ──
  var startBtns = document.querySelectorAll('.tgc-start-btn');
  for (var i = 0; i < startBtns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        var key = btn.getAttribute('data-key');
        startButtonsEl.style.display = 'none';
        appendMessage('user', btn.textContent.trim());
        sendToApi(null, key);
      });
    })(startBtns[i]);
  }
  
  // ── 送信ボタン ──
  sendBtn.addEventListener('click', function() {
    sendMessage();
  });
  
  // ── Enter キーで送信 ──
  inputEl.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  
  function sendMessage() {
    if (isRequestInProgress) return;
    
    var message = inputEl.value.trim();
    if (!message) return;
    
    appendMessage('user', message);
    inputEl.value = '';
    startButtonsEl.style.display = 'none';
    sendToApi(message, null);
  }
  
  // ── API 通信 ──
  function sendToApi(message, startButtonKey) {
    isRequestInProgress = true;
    sendBtn.disabled = true;
    
    var loadingId = 'loading-' + Date.now();
    appendMessage('assistant', '<span class="tgc-loading">考えています</span>', loadingId);
    
    var body = {
      sessionId: SESSION_ID,
      message: message || '',
      startButtonKey: startButtonKey || ''
    };
    
    fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(response) {
      return response.json().then(function(data) {
        return { ok: response.ok, data: data };
      });
    })
    .then(function(result) {
      var loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.remove();
      
      if (!result.ok) {
        appendMessage('assistant', 
          result.data.error || '申し訳ありません、エラーが発生しました。');
        return;
      }
      
      var data = result.data;
      
      // AI 応答を表示
      appendMessage('assistant', data.response);
      
      // ターン数更新
      turnCount = data.turnCount;
      remainingEl.textContent = data.remainingTurns;
      
      // 残りターンが少なくなったら色を変える
      if (data.remainingTurns <= 3) {
        remainingEl.parentElement.style.borderColor = '#e85d5d';
        remainingEl.parentElement.style.color = '#e85d5d';
      }
      
      // 制限到達時の処理
      if (data.isLimitReached) {
        inputEl.disabled = true;
        sendBtn.disabled = true;
        inputEl.placeholder = '体験終了 - Founder 申込はこちら';
        footerEl.style.display = 'block';
      }
    })
    .catch(function(e) {
      var loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.remove();
      appendMessage('assistant', 
        '接続エラーが発生しました。しばらくしてからお試しください。');
      console.error('[TGC] Error:', e);
    })
    .finally(function() {
      isRequestInProgress = false;
      sendBtn.disabled = false;
    });
  }
  
  // ── メッセージ追加 ──
  function appendMessage(role, content, id) {
    var div = document.createElement('div');
    div.className = 'tgc-message tgc-' + role;
    if (id) div.id = id;
    
    var contentDiv = document.createElement('div');
    contentDiv.className = 'tgc-message-content';
    
    // XSS 対策: ユーザー入力はテキストノードとして挿入
    if (role === 'user') {
      var p = document.createElement('p');
      p.textContent = content;
      contentDiv.appendChild(p);
    } else {
      // AI 応答は改行をパラグラフに変換（HTML タグは許可）
      contentDiv.innerHTML = '<p>' + 
        content.replace(/\n\n/g, '</p><p>')
               .replace(/\n/g, '<br>') + 
        '</p>';
    }
    
    div.appendChild(contentDiv);
    messagesEl.appendChild(div);
    
    // スクロール
    setTimeout(function() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, 50);
  }
})();
</script>

     END: 天聞アーク ゲストチャット 埋め込み
