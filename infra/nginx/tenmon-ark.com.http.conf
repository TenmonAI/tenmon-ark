# HTTP のみの設定（開発環境用）
# 本番環境では HTTPS 設定を使用してください

server {
    listen 80;
    listen [::]:80;
    # 開発用サンプル。実ドメインと同時に有効化しても衝突しないよう example.invalid を使う。
    server_name http-sample.tenmon-ark.example.invalid www.http-sample.tenmon-ark.example.invalid;

    root /var/www/tenmon-pwa/pwa;
    index index.html;

    # ★ API プロキシ（location / より前に定義することが必須）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # CARD-MC-13: defense-in-depth — strip any client-sent MC trust header.
        proxy_set_header X-Tenmon-MC-Basic-Trust "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # CARD-MC-16: Claude read lane — Bearer only.
    location = /api/mc/vnext/claude-summary {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Tenmon-MC-Basic-Trust "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # CARD-MC-13: owner-only MC API proxy — Basic auth + trust-header injection.
    location ^~ /api/mc/vnext/ {
        auth_basic "TENMON-MC (Owner Only)";
        auth_basic_user_file /var/www/tenmon-mc/.htpasswd;
        include /etc/nginx/snippets/tenmon-mc-trust.conf;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     "";
        proxy_set_header X-Tenmon-MC-Basic-Trust $tenmon_mc_trust_token;
    }

    # WebSocket（Socket.IO）サポート
    location /api/socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_mc_owner_gate {
        internal;
        proxy_pass http://127.0.0.1:3000/api/mc/access;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location @mc_login {
        return 302 /pwa/login-local.html?next=$request_uri;
    }
    location @mc_forbidden {
        default_type text/plain;
        return 403 "MC is owner-only.";
    }

    location ^~ /pwa/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /mc {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/;
    }
    location = /mc/ {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        default_type text/html;
        rewrite ^ /__mc_hub_serve last;
    }
    location = /__mc_hub_serve {
        internal;
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        default_type text/html;
        alias /var/www/mc-landing/index.html;
    }
    location = /mc/vnext {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/vnext/;
    }
    location = /mc/quality {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/vnext/quality;
    }
    location = /mc/alerts {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/vnext/alerts;
    }
    location = /mc/acceptance {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/vnext/acceptance;
    }
    location = /mc/sources {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/vnext/sources;
    }
    location = /mc/repair {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/vnext/repair;
    }
    location = /mc/history {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/vnext/history;
    }
    location ^~ /mc/vnext/ {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        default_type text/html;
        rewrite ^ /__mc_vnext_serve last;
    }
    location = /__mc_vnext_serve {
        internal;
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        default_type text/html;
        alias /var/www/tenmon-pwa/pwa/index.html;
    }
    location = /pwa/mc/vnext {
        return 302 /mc/vnext/;
    }
    location ^~ /pwa/mc/vnext/ {
        rewrite ^/pwa/mc/vnext/?(.*)$ /mc/vnext/$1 redirect;
    }
    location = /mc/classic {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        return 302 /mc/classic/;
    }
    location ^~ /mc/classic/ {
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        default_type text/html;
        alias /var/www/tenmon-mc/;
        try_files $uri $uri/ /__mc_classic_serve;
    }
    location = /__mc_classic_serve {
        internal;
        auth_request /_mc_owner_gate;
        error_page 401 = @mc_login;
        error_page 403 = @mc_forbidden;
        default_type text/html;
        alias /var/www/tenmon-mc/index.html;
    }

    # ★ SPA 用 location（/api/ より後に定義）
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # セキュリティヘッダー
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

