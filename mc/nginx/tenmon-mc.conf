# ============================================================
# TENMON-MC Mission Control — nginx location block
# このブロックを既存の tenmon-ark.com server {} 内に追記する
# ============================================================

# --- BEGIN TENMON-MC ---
location /mc/ {
    alias /var/www/tenmon-mc/;
    index index.html;

    # Basic Auth
    auth_basic "TENMON-MC (Owner Only)";
    auth_basic_user_file /var/www/tenmon-mc/.htpasswd;

    # セキュリティヘッダ
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # JSON/TXT はキャッシュ無効化（常に最新のスナップショット）
    location ~* /mc/data/.*\.(json|txt)$ {
        alias /var/www/tenmon-mc/;
        # rewrite で正しいパスに
        auth_basic "TENMON-MC (Owner Only)";
        auth_basic_user_file /var/www/tenmon-mc/.htpasswd;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
}
# --- END TENMON-MC ---
