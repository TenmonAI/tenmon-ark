<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TENMON-MC / AI Agents</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="ai_agents.css">
</head>
<body class="dashboard">
<header>
  <h1>TENMON-ARK / AI Agent Activity</h1>
  <nav>
    <a href="./">Text Report</a>
    <a href="./dashboard.html">Dashboard</a>
    <a href="./ai_agents.html" class="active">AI Agents</a>
  </nav>
  <p id="last-updated">Loading...</p>
</header>

<main>
  <section class="agent-filter">
    <label>Filter: </label>
    <select id="agent-filter" onchange="render()">
      <option value="">All Agents</option>
      <option value="claude">Claude</option>
      <option value="gpt-4o">GPT-4o</option>
      <option value="manus">Manus</option>
      <option value="cursor">Cursor</option>
    </select>
    <select id="action-filter" onchange="render()">
      <option value="">All Actions</option>
      <option value="observation">Observation</option>
      <option value="analysis">Analysis</option>
      <option value="proposal">Proposal</option>
      <option value="concern">Concern</option>
    </select>
    <select id="priority-filter" onchange="render()">
      <option value="">All Priorities</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <span id="result-count" style="color:#666; margin-left:12px;"></span>
  </section>

  <section id="activity-list" class="activity-list">
    Loading...
  </section>
</main>

<footer>
  <p>TENMON-ARK / Owner Only</p>
</footer>

<script src="ai_agents.js"></script>
</body>
</html>
